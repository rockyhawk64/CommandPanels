name: Bug Report
description: File a bug report
labels: ["bug"]
body:
  - type: checkboxes
    id: searched
    attributes:
      label: Before you submit
      options:
        - label: "I have checked the wiki to see if my issue is already covered."
          required: true
        - label: "I have asked for help in the Discord server (or was redirected here)."
          required: true

  - type: dropdown
    id: server_version
    attributes:
      label: Server version
      options:
        - 1.21.x
        - 26.1.x
        - Other
    validations:
      required: true

  - type: dropdown
    id: commandpanels_version
    attributes:
      label: CommandPanels version
      options:
        - 4.0.x
        - 4.1.x
        - Other
    validations:
      required: true

  - type: dropdown
    id: server_software
    attributes:
      label: Server software
      options:
        - Paper
        - Folia
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
      placeholder: "Example: Clicking a panel button while in a claim does nothing."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Describe how to reproduce the issue step by step.
      placeholder: |
        1. Open the panel with '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: "Example: The panel button should run the command as normal."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error (optional)
      description: Copy and paste any relevant error from your console (automatically formatted as code).
      render: shell

  - type: textarea
    id: configuration_files
    attributes:
      label: Config files (optional)
      description: Drag and drop any relevant panel or config files here.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or videos (optional)
      description: Drag and drop files or paste links if applicable.

  - type: markdown
    attributes:
      value: |
        ## Thanks for taking the time to fill out this bug report!