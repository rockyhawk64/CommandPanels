name: Need Help
description: Create an issue for a problem you are having.
labels: ["help wanted"]
body:
  - type: checkboxes
    id: searched
    attributes:
      label: Before you submit
      options:
        - label: "I have checked the wiki to see if my issue is already covered."
          required: true
        - label: "I have asked for help in the Discord server (or was redirected here)."
          required: true

  - type: dropdown
    id: server_version
    attributes:
      label: Server version
      options:
        - 1.21.x
        - 26.1.x
        - Other
    validations:
      required: true

  - type: dropdown
    id: commandpanels_version
    attributes:
      label: CommandPanels version
      options:
        - 4.0.x
        - 4.1.x
        - Other
    validations:
      required: true

  - type: dropdown
    id: server_software
    attributes:
      label: Server software
      options:
        - Paper
        - Folia
        - Other
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Describe your issue
      description: Explain what you are trying to do, what is going wrong, and include any relevant panel files or links (e.g. pastebin). Screenshots or videos can also be pasted or dragged in here.
      placeholder: "Example: I am trying to run a command when a player opens a panel but nothing happens."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Thanks for taking the time to fill out this help request!