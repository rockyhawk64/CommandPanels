# When disabled, custom commands to open panels will not be registered
custom-commands: true

# Amount of time in ticks players must wait between opening panels
cooldown-ticks: 5

# Logs to console whenever a panel is opened
panel-snooper: false

# When enabled, panels will automatically refresh if any observed permissions change.
# Permissions used in HASPERM conditions are considered observed permissions.
permission-observer: true

# Default backend for chest-style inventory panels.
# Supported values: packet, legacy
inventory-backend-default: packet

# Logs invalid packet-backed inventory interactions and resyncs.
packet-inventory-debug: false

# Number of invalid packet interactions before a packet-backed menu is closed.
# Set to 0 to disable automatic closure.
packet-close-on-invalid-click-threshold: 5
